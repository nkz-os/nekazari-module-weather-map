apiVersion: batch/v1
kind: CronJob
metadata:
  name: weather-map-cog-generator
  namespace: nekazari
  labels:
    app.kubernetes.io/name: weather-map
    app.kubernetes.io/component: cog-generator
spec:
  schedule: "0 3 */5 * *"  # Every 5 days at 3am
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: generator
            image: ghcr.io/nkz-os/nekazari-module-weather-map@sha256:d7b7e0aa453b7ddc045f88030ed4593a9aa67f34b683ee240a2f5ba2ae74a7b8
            imagePullPolicy: Always
            command: ["python3", "/app/scripts/run_cog_generator.py"]
            env:
            - name: PORT
              value: "8080"
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            - name: MINIO_BUCKET
              value: "nekazari-weather-map"
            - name: ELEVATION_SERVICE_URL
              value: "http://elevation-api-service:80"
            - name: WEATHER_API_URL
              value: "http://weather-api-service:8000"
            - name: ORION_URL
              value: "http://orion-ld-service:1026"
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
            - name: AUTH_DISABLED
              value: "true"
            - name: COG_INTERVAL_DAYS
              value: "5"
            # Postgres for dynamic tenant discovery (mirrors weather-worker / db-init-job)
            - name: POSTGRES_HOST
              value: "postgresql-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "nekazari"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
            resources:
              requests:
                cpu: "500m"
                memory: "512Mi"
              limits:
                cpu: "2"
                memory: "2Gi"
          restartPolicy: OnFailure
