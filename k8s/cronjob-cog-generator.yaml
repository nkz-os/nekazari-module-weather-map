apiVersion: batch/v1
kind: CronJob
metadata:
  name: weather-map-cog-generator
  namespace: nekazari
  labels:
    app.kubernetes.io/name: weather-map
    app.kubernetes.io/component: cog-generator
spec:
  schedule: "0 3 */5 * *"  # Every 5 days at 3am
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: generator
            image: ghcr.io/nkz-os/nekazari-module-weather-map@sha256:603df7230656fe6d4e1191e672d1d901703c374ef2e0b435aa1e3d6971840f99
            imagePullPolicy: Always
            command: ["python3", "/app/scripts/run_cog_generator.py"]
            env:
            - name: PORT
              value: "8080"
            - name: MINIO_ENDPOINT
              value: "minio-service:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
            - name: MINIO_BUCKET
              value: "nekazari-weather-map"
            - name: ELEVATION_SERVICE_URL
              value: "http://elevation-api-service:80"
            - name: WEATHER_API_URL
              value: "http://weather-api-service:8000"
            - name: ORION_URL
              value: "http://orion-ld-service:1026"
            - name: AUTH_DISABLED
              value: "true"
            - name: COG_INTERVAL_DAYS
              value: "5"
            resources:
              requests:
                cpu: "500m"
                memory: "512Mi"
              limits:
                cpu: "2"
                memory: "2Gi"
          restartPolicy: OnFailure
