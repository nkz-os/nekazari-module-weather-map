apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-map-api
  namespace: nekazari
spec:
  ingressClassName: traefik
  rules:
  - host: YOUR_DOMAIN
    http:
      paths:
      - backend:
          service:
            name: weather-map-backend
            port:
              number: 8080
        path: /api/weather-map
        pathType: Prefix
